name: Build Mac App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mac.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --name "IslamicShortcuts" mac_hotkey.py

      - name: Zip Mac App
        run: |
          cd dist
          zip -r IslamicShortcuts-Mac.zip "IslamicShortcuts.app"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IslamicShortcuts-Mac
          path: dist/IslamicShortcuts-Mac.zip
